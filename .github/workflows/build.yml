name: build

# Build release binaries for macOS (Apple Silicon), Linux x64, and Linux arm64
# on the `stable` branch, using the Rust stable toolchain, then commit the
# prebuilt binaries back into `stable/dist/` so the plugin installs without
# compiling.
on:
  push:
    branches: [stable]
    tags: ["v*"]
    # The publish step commits into dist/; ignore it so that doesn't re-trigger.
    paths-ignore: ["dist/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + target
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install musl linker
        if: contains(matrix.target, 'unknown-linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Test
        run: cargo test --locked --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tmux-palette-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/tmux-palette
          if-no-files-found: error

  # Commit the freshly built binaries into stable/dist/ so users can install
  # straight from the branch with no toolchain. Runs only for pushes to stable.
  publish:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/stable'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: publish-stable
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stable

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage binaries into dist/
        run: |
          mkdir -p dist
          cp artifacts/tmux-palette-linux-x64/tmux-palette     dist/tmux-palette-linux-x64
          cp artifacts/tmux-palette-linux-arm64/tmux-palette   dist/tmux-palette-linux-arm64
          cp artifacts/tmux-palette-macos-arm64/tmux-palette   dist/tmux-palette-macos-arm64
          chmod +x dist/tmux-palette-linux-x64 dist/tmux-palette-linux-arm64 dist/tmux-palette-macos-arm64

      - name: Commit prebuilt binaries
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/tmux-palette-linux-x64 dist/tmux-palette-linux-arm64 dist/tmux-palette-macos-arm64
          if git diff --cached --quiet; then
            echo "No binary changes to commit."
          else
            # GITHUB_TOKEN pushes don't re-trigger workflows; [skip ci] is a
            # belt-and-suspenders guard alongside the dist/** paths-ignore.
            git commit -m "ci: publish prebuilt binaries [skip ci]"
            git push origin HEAD:stable
          fi
